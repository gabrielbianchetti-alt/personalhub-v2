name: Deploy Vercel (produção)

# Faz o build+deploy nos runners do GitHub a cada push na main.
# Isso tira o upload da máquina local (fim do ECONNRESET) e não depende
# do GitHub App da Vercel — só de 1 secret: VERCEL_TOKEN.
#
# Configurar uma vez (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN  = token criado em vercel.com/account/tokens
# (VERCEL_ORG_ID e VERCEL_PROJECT_ID já vão como env abaixo.)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  VERCEL_ORG_ID: team_bxfhn27DLOBioPz1Gpi7v719
  VERCEL_PROJECT_ID: prj_TpC8KSSkfLZxGw3t5KrdNaKNlnrE

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest
      - name: Puxar config de produção
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Build de produção
        run: vercel build --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy do artefato pré-buildado
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
